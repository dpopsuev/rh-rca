apiVersion: origami/v1
kind: Component
metadata:
  name: origami-rca-reportportal
  module: github.com/dpopsuev/origami-rca/connectors/rp
  namespace: reportportal
  description: "ReportPortal connector — API client, envelope fetching, defect pushing, run discovery"
spec:
  version: "1.0.0"
  needs:
    origami: ">=0.3.0"
  gives:
    - socket: source
      factory: NewSourceReader
      wire: factory
    - socket: writer
      factory: NewDefectWriter
      wire: factory
    - socket: discoverer
      factory: NewRunDiscoverer
      wire: factory
